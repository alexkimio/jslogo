<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Logo Generator</title>
  <meta name="description" content="Generate JavaScript-style language logos instantly. Pick a language preset or customize colors and text, then download as PNG.">
  <meta property="og:title" content="JS Logo Generator">
  <meta property="og:description" content="Generate JavaScript-style language logos instantly. Pick a language preset or customize colors and text, then download as PNG.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jslogo.alexkim.io/">
  <meta property="og:image" content="https://jslogo.alexkim.io/jsl-logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="JS Logo Generator">
  <meta name="twitter:description" content="Generate JavaScript-style language logos instantly. Pick a language preset or customize colors and text, then download as PNG.">
  <meta name="twitter:image" content="https://jslogo.alexkim.io/jsl-logo.png">
  <link rel="icon" href="favicon.ico">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --border-mid: #2a2a2a;
      --text: #d8d8d8;
      --muted: #4a4a4a;
      --accent: #F7DF1E;
      --font: ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Menlo, 'Courier New', monospace;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ─── */
    header {
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8,8,8,0.8);
      backdrop-filter: blur(8px);
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .js-badge {
      width: 26px;
      height: 26px;
      background: var(--accent);
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 2px 3px;
      flex-shrink: 0;
    }

    .js-badge span {
      font-size: 9px;
      font-weight: 700;
      color: #000;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
    }

    .version {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ─── Layout ─── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: grid;
      grid-template-columns: 288px 1fr;
      min-height: 0;
    }

    /* ─── Controls ─── */
    .controls {
      border-right: 1px solid var(--border);
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      background: rgba(8,8,8,0.5);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .control-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    /* Text input */
    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      color: var(--text);
      font-family: var(--font);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 11px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.12s;
      caret-color: var(--accent);
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    /* Color picker */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      padding: 9px 12px;
      transition: border-color 0.12s;
      width: 100%;
    }

    .color-row:focus-within {
      border-color: var(--accent);
    }

    .swatch-wrap {
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
    }

    .swatch {
      width: 22px;
      height: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      display: block;
    }

    input[type="color"] {
      position: absolute;
      opacity: 0;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .hex-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--text);
      caret-color: var(--accent);
      padding: 0;
      min-width: 0;
    }

    /* Slider */
    .slider-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .slider-value {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 1px;
      background: var(--border-mid);
      outline: none;
      cursor: pointer;
      margin: 8px 0 4px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 13px;
      height: 13px;
      background: var(--accent);
      cursor: pointer;
      border: none;
      transition: transform 0.1s;
    }

    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 13px;
      height: 13px;
      background: var(--accent);
      cursor: pointer;
      border: none;
      border-radius: 0;
    }

    .slider-ends {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Random button */
    .random-btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--muted);
      font-family: var(--font);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
      line-height: 1.4;
    }

    .random-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .random-btn:active {
      transform: scale(0.95);
    }

    /* Color palettes */
    .color-palettes-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }

    .color-chip {
      aspect-ratio: 1;
      position: relative;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.12s, transform 0.1s;
      overflow: hidden;
    }

    .color-chip:hover {
      transform: scale(1.12);
    }

    .color-chip.active {
      border-color: rgba(255,255,255,0.7);
    }

    .color-chip-fg {
      position: absolute;
      inset: 0;
      clip-path: polygon(100% 35%, 100% 100%, 35% 100%);
    }

    /* Language presets */
    .presets-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .preset-chip {
      container-type: inline-size;
      aspect-ratio: 1;
      position: relative;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.12s, transform 0.1s;
      overflow: hidden;
    }

    .preset-chip:hover {
      transform: scale(1.06);
    }

    .preset-chip.active {
      border-color: var(--accent);
    }

    .preset-chip-text {
      position: absolute;
      bottom: 8cqi;
      right: 8cqi;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 40cqi;
      line-height: 1;
      white-space: nowrap;
    }

    /* Separator */
    .sep {
      height: 1px;
      background: var(--border);
    }

    /* Download */
    .spacer { flex: 1; }

    .download-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 14px;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .download-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.1);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .download-btn:hover::before { opacity: 1; }
    .download-btn:active { transform: scale(0.98); }

    /* ─── Preview area ─── */
    .preview-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
    }

    .canvas-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .canvas-frame {
      position: relative;
    }

    /* Crosshair corner marks */
    .canvas-frame::before,
    .canvas-frame::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--border-mid);
      border-style: solid;
    }

    .canvas-frame::before {
      top: -5px;
      left: -5px;
      border-width: 1px 0 0 1px;
    }

    .canvas-frame::after {
      bottom: -5px;
      right: -5px;
      border-width: 0 1px 1px 0;
    }

    .inner-frame {
      position: relative;
    }

    .inner-frame::before,
    .inner-frame::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--border-mid);
      border-style: solid;
    }

    .inner-frame::before {
      top: -5px;
      right: -5px;
      border-width: 1px 1px 0 0;
    }

    .inner-frame::after {
      bottom: -5px;
      left: -5px;
      border-width: 0 0 1px 1px;
    }

    #preview {
      display: block;
      max-width: min(380px, 60vw);
      max-height: min(380px, 60vw);
      width: auto;
      height: auto;
      box-shadow:
        0 0 0 1px var(--border),
        0 20px 60px rgba(0,0,0,0.7),
        0 4px 16px rgba(0,0,0,0.5);
    }

    .canvas-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .meta-dot {
      width: 3px;
      height: 3px;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 680px) {
      header {
        padding: 12px 16px;
      }

      body {
        overflow: hidden;
        height: 100vh;
      }

      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      /* Preview at top, always visible */
      .preview-area {
        order: -1;
        padding: 20px 20px;
        border-bottom: 1px solid var(--border);
      }

      #preview {
        max-width: min(220px, 64vw);
        max-height: min(220px, 64vw);
      }

      .canvas-meta {
        gap: 10px;
      }

      /* Controls scroll inside */
      .controls {
        border-right: none;
        overflow-y: auto;
        min-height: 0;
        padding: 20px 16px 36px;
        gap: 18px;
      }

      .spacer { display: none; }

      /* Bigger touch target for slider */
      input[type="range"] {
        height: 3px;
        margin: 14px 0 6px;
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 22px;
        height: 22px;
      }

      input[type="range"]::-moz-range-thumb {
        width: 22px;
        height: 22px;
        border-radius: 0;
      }

      .random-btn {
        padding: 8px 12px;
        touch-action: manipulation;
      }

      .color-row {
        padding: 12px 14px;
      }

      .swatch-wrap .swatch {
        width: 28px;
        height: 28px;
      }

      .color-chip:hover,
      .preset-chip:hover {
        transform: none;
      }

      .download-btn {
        padding: 20px;
        font-size: 11px;
        touch-action: manipulation;
      }
    }

    @media (max-width: 380px) {
      #preview {
        max-width: min(190px, 60vw);
        max-height: min(190px, 60vw);
      }

      input[type="text"] {
        font-size: 18px;
      }

      .color-palettes-grid {
        gap: 3px;
      }

      .presets-grid {
        gap: 4px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="title-group">
    <div class="js-badge"><span>JS</span></div>
    <h1>Logo&nbsp;Generator</h1>
  </div>
  <span class="version">v1.1.0</span>
</header>

<main>
  <div class="controls">

    <div class="control-group">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="control-label">Colors</span>
        <button class="random-btn" id="random-btn">&#x2B22; Random</button>
      </div>
      <div class="color-palettes-grid" id="color-palettes-grid"></div>
    </div>

    <div class="sep"></div>

    <div class="control-group">
      <span class="control-label">Languages</span>
      <div class="presets-grid" id="presets-grid"></div>
    </div>

    <div class="sep"></div>

    <div class="control-group">
      <span class="control-label">Text</span>
      <input
        type="text"
        id="text"
        value="JS"
        maxlength="4"
        spellcheck="false"
        autocomplete="off"
        placeholder="JS"
      >
    </div>

    <div class="sep"></div>

    <div class="control-group">
      <span class="control-label">Background</span>
      <div class="color-row">
        <label class="swatch-wrap">
          <div class="swatch" id="bg-swatch" style="background:#F7DF1E;"></div>
          <input type="color" id="bg-color" value="#F7DF1E">
        </label>
        <input type="text" class="hex-input" id="bg-hex" value="#F7DF1E" maxlength="7" spellcheck="false" autocomplete="off">
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Text Color</span>
      <div class="color-row">
        <label class="swatch-wrap">
          <div class="swatch" id="fg-swatch" style="background:#000000;"></div>
          <input type="color" id="fg-color" value="#000000">
        </label>
        <input type="text" class="hex-input" id="fg-hex" value="#000000" maxlength="7" spellcheck="false" autocomplete="off">
      </div>
    </div>

    <div class="sep"></div>

    <div class="control-group">
      <div class="slider-header">
        <span class="control-label">Font Size</span>
        <span class="slider-value" id="font-label">55%</span>
      </div>
      <input type="range" id="font-size" min="20" max="85" value="55" step="1">
      <div class="slider-ends">
        <span>20%</span>
        <span>85%</span>
      </div>
    </div>

    <div class="spacer"></div>

    <button class="download-btn" id="download">↓&nbsp;&nbsp;Download PNG</button>

  </div>

  <div class="preview-area">
    <div class="canvas-stack">
      <div class="canvas-frame">
        <div class="inner-frame">
          <canvas id="preview" width="256" height="256"></canvas>
        </div>
      </div>
      <div class="canvas-meta">
        <span><span class="meta-dot"></span>PNG</span>
        <span id="meta-dim">256 × 256 px</span>
        <span>sRGB</span>
      </div>
    </div>
  </div>
</main>

<script>
  const SIZE = 512;

  const COLOR_PRESETS = [
    { name: 'JS Classic',   bg: '#F7DF1E', fg: '#000000' },
    { name: 'Neon Green',   bg: '#0A0A0A', fg: '#39FF14' },
    { name: 'Crimson',      bg: '#C0392B', fg: '#FFFFFF' },
    { name: 'Ocean',        bg: '#0077B6', fg: '#CAF0F8' },
    { name: 'Forest',       bg: '#1B4332', fg: '#95D5B2' },
    { name: 'Sunset',       bg: '#FF6348', fg: '#FFFFFF' },
    { name: 'Lavender',     bg: '#6C63FF', fg: '#FFFFFF' },
    { name: 'Slate',        bg: '#1E293B', fg: '#94A3B8' },
    { name: 'Amber',        bg: '#F59E0B', fg: '#1C1917' },
    { name: 'Teal',         bg: '#0F766E', fg: '#CCFBF1' },
    { name: 'Dusk',         bg: '#2D1B69', fg: '#A78BFA' },
    { name: 'Carbon',       bg: '#1C1C1C', fg: '#FFFFFF' },
    { name: 'Coral',        bg: '#FF6B6B', fg: '#1A1A1A' },
    { name: 'Mint',         bg: '#ECFDF5', fg: '#065F46' },
    { name: 'Rose Gold',    bg: '#B76E79', fg: '#FFF0F3' },
    { name: 'Copper',       bg: '#8B4513', fg: '#FFD700' },
    { name: 'Midnight',     bg: '#0D1B2A', fg: '#E0E0E0' },
    { name: 'Cherry',       bg: '#880E4F', fg: '#FCE4EC' },
  ];

  const PRESETS = [
    { name: 'JavaScript', text: 'JS',  bg: '#F7DF1E', fg: '#000000' },
    { name: 'TypeScript', text: 'TS',  bg: '#3178C6', fg: '#FFFFFF' },
    { name: 'Go',         text: 'GO',  bg: '#00ADD8', fg: '#FFFFFF' },
    { name: 'C#',         text: 'C#',   bg: '#512BD4', fg: '#FFFFFF' },
    { name: 'CSS',        text: 'CSS',  bg: '#264DE4', fg: '#FFFFFF' },
    { name: 'HTML',       text: 'HTML', bg: '#E34F26', fg: '#FFFFFF' },
    { name: 'PHP',        text: 'PHP',  bg: '#777BB4', fg: '#FFFFFF' },
    { name: 'Java',       text: 'JAVA', bg: '#ED8B00', fg: '#FFFFFF' },
  ];

  const canvas     = document.getElementById('preview');
  const ctx        = canvas.getContext('2d');
  const textEl     = document.getElementById('text');
  const bgColor    = document.getElementById('bg-color');
  const fgColor    = document.getElementById('fg-color');
  const fontSizeEl = document.getElementById('font-size');
  const fontLabel  = document.getElementById('font-label');
  const metaDim    = document.getElementById('meta-dim');
  const bgSwatch   = document.getElementById('bg-swatch');
  const bgHex      = document.getElementById('bg-hex');
  const fgSwatch   = document.getElementById('fg-swatch');
  const fgHex      = document.getElementById('fg-hex');
  const dlBtn      = document.getElementById('download');
  const randomBtn  = document.getElementById('random-btn');

  canvas.width  = SIZE;
  canvas.height = SIZE;
  metaDim.textContent = `${SIZE} × ${SIZE} px`;

  function renderLogo(text, bg, fg, fontPct) {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, SIZE, SIZE);

    const t      = text || 'JS';
    const pad    = Math.floor(SIZE * 0.08);
    const maxW   = SIZE - 2 * pad;
    let fontSize = Math.floor(SIZE * fontPct / 100 * 2 / Math.max(t.length, 2));

    ctx.fillStyle = fg;
    ctx.font = `bold ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    while (ctx.measureText(t).width > maxW && fontSize > 10) {
      fontSize -= 2;
      ctx.font = `bold ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    }

    ctx.textAlign    = 'right';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(t, SIZE - pad, SIZE - pad);
  }

  function update() {
    const text    = textEl.value || 'JS';
    const bg      = bgColor.value;
    const fg      = fgColor.value;
    const fontPct = parseInt(fontSizeEl.value, 10);

    fontLabel.textContent = `${fontPct}%`;

    bgSwatch.style.background = bg;
    if (document.activeElement !== bgHex) bgHex.value = bg.toUpperCase();
    fgSwatch.style.background = fg;
    if (document.activeElement !== fgHex) fgHex.value = fg.toUpperCase();

    renderLogo(text, bg, fg, fontPct);
  }

  function applyHex(input, colorInput) {
    const val = input.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(val)) {
      colorInput.value = val;
      if (activeChip) activeChip.classList.remove('active');
      activeChip = null;
      if (activeColorChip) activeColorChip.classList.remove('active');
      activeColorChip = null;
      update();
    }
  }

  bgHex.addEventListener('input', () => applyHex(bgHex, bgColor));
  fgHex.addEventListener('input', () => applyHex(fgHex, fgColor));

  // Build color palette chips
  const colorPresetsGrid = document.getElementById('color-palettes-grid');
  let activeColorChip = null;

  COLOR_PRESETS.forEach(palette => {
    const chip = document.createElement('div');
    chip.className = 'color-chip';
    chip.title = palette.name;
    chip.style.background = palette.bg;
    chip.innerHTML = `<div class="color-chip-fg" style="background:${palette.fg}"></div>`;

    chip.addEventListener('click', () => {
      bgColor.value = palette.bg;
      fgColor.value = palette.fg;
      if (activeColorChip) activeColorChip.classList.remove('active');
      chip.classList.add('active');
      activeColorChip = chip;
      if (activeChip) activeChip.classList.remove('active');
      activeChip = null;
      update();
    });

    colorPresetsGrid.appendChild(chip);
  });

  // Build language preset chips
  const presetsGrid = document.getElementById('presets-grid');
  let activeChip = null;

  PRESETS.forEach((preset, i) => {
    const chip = document.createElement('div');
    chip.className = 'preset-chip' + (i === 0 ? ' active' : '');
    chip.title = preset.name;
    chip.style.background = preset.bg;
    const chipFontSize = preset.text.length >= 3 ? '26cqi' : '40cqi';
    chip.innerHTML = `<span class="preset-chip-text" style="color:${preset.fg};font-size:${chipFontSize}">${preset.text}</span>`;

    chip.addEventListener('click', () => {
      textEl.value = preset.text;
      bgColor.value = preset.bg;
      fgColor.value = preset.fg;
      if (activeChip) activeChip.classList.remove('active');
      chip.classList.add('active');
      activeChip = chip;
      if (activeColorChip) activeColorChip.classList.remove('active');
      activeColorChip = null;
      update();
    });

    presetsGrid.appendChild(chip);
    if (i === 0) activeChip = chip;
  });

  // Deactivate active chips on manual edit
  [textEl, bgColor, fgColor].forEach(el => el.addEventListener('input', () => {
    if (activeChip) activeChip.classList.remove('active');
    activeChip = null;
    if (activeColorChip) activeColorChip.classList.remove('active');
    activeColorChip = null;
  }));

  [textEl, bgColor, fgColor, fontSizeEl].forEach(el => el.addEventListener('input', update));

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const k = (n + h / 30) % 12;
      const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      return Math.round(255 * c).toString(16).padStart(2, '0');
    };
    return `#${f(0)}${f(8)}${f(4)}`;
  }

  function randomPleasantColors() {
    const bgHue   = Math.random() * 360;
    const bgSat   = 45 + Math.random() * 35;
    const bgLight = 20 + Math.random() * 45;
    const fgHue   = Math.random() * 360;
    const fgLight = bgLight < 45 ? 78 + Math.random() * 17 : 5 + Math.random() * 17;
    const fgSat   = 20 + Math.random() * 60;
    return { bg: hslToHex(bgHue, bgSat, bgLight), fg: hslToHex(fgHue, fgSat, fgLight) };
  }

  randomBtn.addEventListener('click', () => {
    const { bg, fg } = randomPleasantColors();
    bgColor.value = bg;
    fgColor.value = fg;
    if (activeColorChip) activeColorChip.classList.remove('active');
    activeColorChip = null;
    if (activeChip) activeChip.classList.remove('active');
    activeChip = null;
    update();
  });

  dlBtn.addEventListener('click', () => {
    const name = (textEl.value || 'js').toLowerCase().replace(/\s+/g, '-');
    const a = document.createElement('a');
    a.download = `${name}-logo.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  update();
</script>

</body>
</html>
